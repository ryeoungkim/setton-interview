<!doctype html>
<html lang="ja">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover">
<meta name="robots" content="noindex">
<title>セットン 代表ページ</title>
<style>
  :root {
    --bg: #FAF7F1; --surface: #FFFFFF; --ink: #2B2622; --ink-2: #7A7168; --line: #E8E1D6;
    --accent: #B5453E; --calm: #33569E;
    --sd1:#2E5FA3; --sd2:#C4413C; --sd3:#E0AE38; --sd4:#3E8E5A; --sd5:#8A5CA8;
    --serif: "Hiragino Mincho ProN", "Yu Mincho", serif;
    --sans: "Hiragino Kaku Gothic ProN", "Hiragino Sans", "Yu Gothic Medium", Meiryo, sans-serif;
  }
  @media (prefers-color-scheme: dark) {
    :root { --bg:#171512; --surface:#211E1A; --ink:#ECE7DF; --ink-2:#A79D91; --line:#37322B;
      --accent:#D96C63; --calm:#8AA6E0; --sd1:#5B84C9; --sd2:#D4655F; --sd3:#D9B45C; --sd4:#5FAE7D; --sd5:#A57EC4; }
  }
  * { box-sizing: border-box; -webkit-tap-highlight-color: transparent; }
  html, body { height: 100%; }
  body { margin: 0; background: var(--bg); color: var(--ink); font-family: var(--sans);
    font-size: 16px; line-height: 1.9; display: flex; flex-direction: column; }
  .stripe { height: 4px; flex: none;
    background: linear-gradient(90deg, var(--sd1) 0 20%, var(--sd2) 20% 40%, var(--sd3) 40% 60%, var(--sd4) 60% 80%, var(--sd5) 80% 100%); }
  main { flex: 1; width: 100%; max-width: 560px; margin: 0 auto; padding: 40px 24px 40px;
    display: flex; flex-direction: column; }
  .head { text-align: center; margin-bottom: 34px; }
  .head .orb { width: 56px; height: 56px; border-radius: 50%; margin: 8px auto 18px;
    background: radial-gradient(circle at 35% 30%, var(--calm), color-mix(in srgb, var(--calm) 60%, var(--ink))); }
  h1 { font-family: var(--serif); font-size: 27px; font-weight: 600; line-height: 1.5; margin: 0 0 10px; text-wrap: balance; }
  .head p { color: var(--ink-2); font-size: 15px; margin: 0; }
  .cards { display: flex; flex-direction: column; gap: 16px; }
  .card { display: flex; align-items: center; gap: 18px; text-decoration: none; color: inherit;
    background: var(--surface); border: 1.5px solid var(--line); border-radius: 18px; padding: 22px 22px;
    box-shadow: 0 4px 18px color-mix(in srgb, var(--ink) 6%, transparent); transition: transform .12s ease, border-color .12s ease; }
  .card:active { transform: scale(.985); }
  .card:hover { border-color: color-mix(in srgb, var(--calm) 45%, var(--line)); }
  .card .ic { flex: none; width: 56px; height: 56px; border-radius: 15px; display: flex; align-items: center; justify-content: center; font-size: 28px; }
  .card.iv .ic { background: color-mix(in srgb, var(--calm) 14%, transparent); }
  .card.rv .ic { background: color-mix(in srgb, var(--accent) 13%, transparent); }
  .card .tx h2 { font-family: var(--serif); font-size: 20px; font-weight: 600; margin: 0 0 4px; }
  .card .tx p { font-size: 13.5px; color: var(--ink-2); margin: 0; line-height: 1.7; }
  .card .arw { margin-left: auto; color: var(--ink-2); font-size: 20px; flex: none; }
  footer { flex: none; text-align: center; font-size: 11.5px; color: var(--ink-2); padding: 20px; }
  :focus-visible { outline: 2px solid var(--calm); outline-offset: 3px; }
</style>
</head>
<body>
<div class="stripe"></div>
<main>
  <div class="head">
    <div class="orb"></div>
    <h1>イ・スンソン先生<br>おつかれさまです</h1>
    <p>きょうは、どちらをなさいますか？</p>
  </div>
  <div class="cards">
    <a class="card iv" href="interview.html">
      <div class="ic">🎙️</div>
      <div class="tx">
        <h2>インタビューに答える</h2>
        <p>声で質問しますので、話すように答えてください。記事のもとになります。</p>
      </div>
      <div class="arw">›</div>
    </a>
    <a class="card rv" href="review.html">
      <div class="ic">📝</div>
      <div class="tx">
        <h2>投稿の確認をする</h2>
        <p>X・note に出す文章です。OKか、直したいところを声で教えてください。</p>
      </div>
      <div class="arw">›</div>
    </a>
  </div>
</main>
<footer>セットン韓国語教室 代表ページ｜v1</footer>
</body>
</html>
